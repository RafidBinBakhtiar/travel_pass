name: travel_pass
description: "Travel Pass Flutter App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:      # ✅ correct name
    sdk: flutter              # ✅ must have sdk: flutter
  phone_form_field: ^8.0.0  # use latest version
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.10
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: 0.20.2
  cupertino_icons: ^1.0.8
  otp_pin_field: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/Logo.svg
    - assets/images/Bg-Image.svg

  fonts:
    - family: Kalpurush          # ✅ family name first
      fonts:                     # ✅ nested fonts list
        - asset: assets/fonts/kalpurush.ttf
          weight: 400
        - asset: assets/fonts/kalpurush ANSI.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Kalpurush-Bold.ttf
          weight: 700

    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Thin.ttf
          weight: 100
        - asset: assets/fonts/Geist-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Geist-Light.ttf
          weight: 300
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
        - asset: assets/fonts/Geist-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Geist-Black.ttf
          weight: 900